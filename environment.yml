# Eye Data Labeller — conda environment.
#
# Bundles:
#   1. micro-sam runtime deps (from micro-sam-master/environment.yaml,
#      minus napari + its pyqt5 transitive — we use PyQt6 directly)
#   2. our app deps (PyQt6, pyqtgraph, qtawesome, pyqtdarktheme,
#      scikit-image, tifffile, pycocotools, opencv)
#
# Create or update:
#   conda env create -f environment.yml          # first time
#   conda env update -f environment.yml --prune  # later, after edits
#
# Activate:
#   conda activate eye-labeller
#
# Run:
#   python main.py

name: eye-labeller
channels:
  - conda-forge
dependencies:
  - python >=3.10,<3.13

  # NOTE: We don't pin BLAS/LAPACK here because Windows conda-forge
  # uses a different build family (MKL-based) than Mac/Linux and
  # adding `libblas=*=*openblas` makes Windows unsolvable. The macOS
  # bundle DOES need OpenBLAS though — numpy 2.x links against LAPACK
  # symbols (e.g. _ctrsyl3_) that Apple's Accelerate doesn't export.
  # That fix is applied as a macOS-only post-create step in
  # .github/workflows/build.yml ("Force OpenBLAS on macOS"). Tier B
  # Mac users running locally may hit the same crash with numpy >=2.4;
  # workaround is the same:
  #   micromamba install -n eye-labeller 'libblas=*=*openblas' 'libcblas=*=*openblas' 'liblapack=*=*openblas'
  # See INSTALL.md troubleshooting if you hit it.

  # ---- micro-sam runtime (mirrors micro-sam/environment.yaml) ----
  # Pytorch from conda-forge is generally the most optimized build for
  # your OS + CUDA. To force CPU-only: replace with `pytorch=*=cpu*`.
  - pytorch >=2.5
  - torchvision
  - segment-anything
  - torch_em >=0.8
  - timm
  - tqdm
  - pooch
  - python-elf >=0.7.1
  - python-xxhash
  - zarr
  - xarray
  - nifty >=1.2.3
  - imagecodecs
  - natsort
  - magicgui          # used by some micro_sam utilities (Qt-agnostic)
  # NOTE: napari and `pyqt` (= PyQt5) intentionally omitted — the labeller
  # is PyQt6-native. Trackastra powers the default tracker; add it back
  # here once Phase 4-tracking lands.
  - trackastra >=0.5.3

  # ---- Eye Data Labeller core deps ----
  - tifffile
  - imageio
  - scikit-image
  # NOTE: we don't list `opencv` here, but it WILL still end up in the
  # env because micro_sam depends on it transitively. That conda-forge
  # opencv works fine for direct (Tier B) users running from the env —
  # it only breaks when bundled by PyInstaller. The .github workflow
  # force-reinstalls opencv-python-headless (pip, bundle-friendly) on
  # top of conda's opencv before running PyInstaller, so Tier A
  # bundles ship with the pip variant. See .github/workflows/build.yml
  # "Force-replace conda opencv with pip headless" step for context.
  - pycocotools

  # micro-sam from conda-forge — cross-platform, no local clone needed.
  # (If you want the editable local clone for hacking on micro-sam,
  #  comment this line out and add `-e <your-local-path>` under pip:.)
  - micro_sam

  - pip
  - pip:
      # PyQt6 stack — installed via pip because conda-forge ships only PyQt5
      - PyQt6
      - pyqtgraph
      - qtawesome
      - pyqtdarktheme
      # MobileSAM (vit_t support) — same as upstream micro-sam env
      - git+https://github.com/ChaoningZhang/MobileSAM.git
