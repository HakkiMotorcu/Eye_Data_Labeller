# Eye Data Labeller — conda environment.
#
# Bundles:
#   1. micro-sam runtime deps (from micro-sam-master/environment.yaml,
#      minus napari + its pyqt5 transitive — we use PyQt6 directly)
#   2. our app deps (PyQt6, pyqtgraph, qtawesome, pyqtdarktheme,
#      scikit-image, tifffile, pycocotools, opencv)
#
# Create or update:
#   conda env create -f environment.yml          # first time
#   conda env update -f environment.yml --prune  # later, after edits
#
# Activate:
#   conda activate eye-labeller
#
# Run:
#   python main.py

name: eye-labeller
channels:
  - conda-forge
dependencies:
  - python >=3.10,<3.13

  # ---- BLAS / LAPACK ---------------------------------------------
  # Force every numerical package in the env to use OpenBLAS rather
  # than Apple's Accelerate framework. Why: numpy 2.x links against
  # LAPACK >=3.10 (it needs symbols like _ctrsyl3_), but Apple's
  # Accelerate re-export shim on macOS arm64 doesn't export them.
  # Inside a live conda env the lookup order happens to work; inside
  # a PyInstaller bundle the dylib reshuffle exposes the gap and
  # numpy crashes at import. OpenBLAS has every symbol — solves it
  # cleanly. Cross-platform safe: Linux + Windows ignore Accelerate
  # anyway, but having one consistent BLAS implementation across the
  # matrix means scipy/numpy ABI quirks behave the same everywhere.
  - libblas=*=*openblas
  - libcblas=*=*openblas
  - liblapack=*=*openblas

  # ---- micro-sam runtime (mirrors micro-sam/environment.yaml) ----
  # Pytorch from conda-forge is generally the most optimized build for
  # your OS + CUDA. To force CPU-only: replace with `pytorch=*=cpu*`.
  - pytorch >=2.5
  - torchvision
  - segment-anything
  - torch_em >=0.8
  - timm
  - tqdm
  - pooch
  - python-elf >=0.7.1
  - python-xxhash
  - zarr
  - xarray
  - nifty >=1.2.3
  - imagecodecs
  - natsort
  - magicgui          # used by some micro_sam utilities (Qt-agnostic)
  # NOTE: napari and `pyqt` (= PyQt5) intentionally omitted — the labeller
  # is PyQt6-native. Trackastra powers the default tracker; add it back
  # here once Phase 4-tracking lands.
  - trackastra >=0.5.3

  # ---- Eye Data Labeller core deps ----
  - tifffile
  - imageio
  - scikit-image
  # NOTE: opencv comes from pip below (opencv-python-headless), NOT from
  # conda-forge. Why: conda-forge's opencv build patches cv2/__init__.py
  # to use absolute paths inside the conda env prefix (e.g.
  # /opt/conda/envs/.../lib/python3.12/site-packages/cv2/python-3.12).
  # Inside a PyInstaller .app those paths don't exist on the user's
  # machine, the bootstrap fails to find the native .so, falls through
  # to a recursive cv2 re-import, and crashes with:
  #   ImportError: ERROR: recursion is detected during loading of
  #   "cv2" binary extensions. Check OpenCV installation.
  # The pip wheel uses LOADER_DIR-relative paths — bundle-portable.
  # Headless variant has no Qt/GTK GUI built-in (we use PyQt6 anyway,
  # so cv2's GUI features are dead weight and would conflict).
  - pycocotools

  # micro-sam from conda-forge — cross-platform, no local clone needed.
  # (If you want the editable local clone for hacking on micro-sam,
  #  comment this line out and add `-e <your-local-path>` under pip:.)
  - micro_sam

  - pip
  - pip:
      # PyQt6 stack — installed via pip because conda-forge ships only PyQt5
      - PyQt6
      - pyqtgraph
      - qtawesome
      - pyqtdarktheme
      # opencv via pip (headless) for PyInstaller compatibility — see
      # comment under the dependencies: block above for the why.
      - opencv-python-headless
      # MobileSAM (vit_t support) — same as upstream micro-sam env
      - git+https://github.com/ChaoningZhang/MobileSAM.git
