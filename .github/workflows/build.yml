name: Build standalone bundles

# Triggers:
#   - push of a tag like v1.2.3 -> build + attach to a GitHub Release
#   - manual run via the Actions UI ("workflow_dispatch")
#   - PR to main -> build only (no Release), to catch packaging regressions
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: write   # needed to attach artifacts to a Release on tag push

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS-arm64
            artifact: EyeDataLabeller-macos-arm64.zip
          - os: windows-latest
            label: Windows-x86_64
            artifact: EyeDataLabeller-windows-x86_64.zip
          # Pinned to 22.04, NOT ubuntu-latest: PyInstaller bundles link
          # against the build machine's glibc, and 24.04's glibc 2.39
          # floor locks out RHEL 9 / Ubuntu 22.04 lab workstations.
          # 22.04 (glibc 2.35) keeps those working.
          - os: ubuntu-22.04
            label: Linux-x86_64
            artifact: EyeDataLabeller-linux-x86_64.zip
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # We use micromamba (not setup-miniconda) because the Ubuntu
      # runner repeatedly died with "received a shutdown signal" mid-
      # solve — the classic conda solver's memory footprint on a
      # large env (PyTorch + micro-sam + scientific stack) pushes a
      # 7 GB runner over the edge. Micromamba uses libmamba's C++
      # solver, which is ~5x faster and dramatically lighter.
      # `init-shell: bash` makes the env auto-activate in subsequent
      # `bash -el {0}` steps (the `-e` makes the script fail-fast).
      - name: Set up micromamba + eye-labeller env
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: environment.yml
          environment-name: eye-labeller
          # init-shell only accepts ONE shell name (the action's schema
          # validates the raw input as a single enum — no whitespace,
          # newline, or comma separation works). Use bash for build
          # steps via `shell: bash -el {0}`.
          init-shell: bash
          # post-cleanup defaults to 'shell-init' which tries to remove
          # micromamba hooks from the shell profile after the job ends.
          # On Windows it fails ("Could not find micromamba activate
          # eye-labeller in C:\Users\runneradmin\.bash_profile") and
          # tanks the whole job with exit code 1 EVEN IF the build
          # succeeded — because Git Bash's .bash_profile doesn't get
          # created on the runner before the post step runs. Setting
          # to 'none' skips the cleanup; this is cosmetic-only on
          # ephemeral runners that are destroyed anyway.
          post-cleanup: none
          # Cache OFF: a restored-from-tar conda env can carry stale or
          # path-broken DLLs across runners (a prime suspect in the
          # Windows Qt-load failures). Now the env is pinned, a fresh
          # solve is reproducible anyway. Re-enable once green if the
          # solve time hurts.
          cache-environment: false

      # macOS-only: force the BLAS/LAPACK stack to OpenBLAS. We can't
      # put this in environment.yml because the openblas constraint
      # makes Windows unsolvable (MKL-based build family conflicts).
      # Why we need it on Mac: numpy 2.x links against LAPACK
      # symbols (notably _ctrsyl3_) that Apple's Accelerate framework
      # doesn't export. Inside a live conda env the dyld lookup
      # happens to find them; inside a PyInstaller .app the layout
      # shifts and numpy crashes at import with:
      #   Symbol not found: _ctrsyl3_
      #     Referenced from: liblapacke-netlib.3.11.0.dylib
      #     Expected in:     libblas_reexport.dylib
      # micromamba install with the constraint forces every BLAS
      # consumer to use the OpenBLAS variant, which has every symbol.
      - name: Force OpenBLAS on macOS (Accelerate symbol gap)
        if: runner.os == 'macOS'
        shell: bash -el {0}
        run: |
          micromamba install -n eye-labeller -y -c conda-forge \
            'libblas=*=*openblas' 'libcblas=*=*openblas' 'liblapack=*=*openblas'

      # PyInstaller has to live in the same env as the app's deps so
      # it can introspect them. Pin to a known-good major.
      - name: Install PyInstaller
        shell: bash -el {0}
        run: |
          pip install "pyinstaller>=6,<7"

      # The conda-forge opencv package patches cv2/__init__.py with
      # absolute paths inside the conda env prefix (e.g.
      # /Users/runner/micromamba/envs/eye-labeller/lib/python3.12/
      # site-packages/cv2/python-3.12). Those paths get baked into the
      # bundled cv2 config files and crash on the user's machine with:
      #
      #   ImportError: ERROR: recursion is detected during loading of
      #   "cv2" binary extensions. Check OpenCV installation.
      #
      # We can't just remove `opencv` from environment.yml — micro_sam
      # depends on it transitively, so conda's solver pulls it in
      # anyway. And pip in the env file runs AFTER conda, so a regular
      # `opencv-python-headless` pip line is silently skipped (cv2 is
      # "already installed"). Solution: force-reinstall pip's headless
      # variant after env setup so the bundle picks it up. --no-deps
      # so we don't reinstall numpy (would clobber the BLAS pin).
      # Code grep confirms we don't use any cv2 GUI features
      # (imshow / namedWindow / waitKey / etc.) so headless is safe.
      # July 2026 re-solve left cv2 split across two half-installed
      # flavors: conda's py-opencv (transitive via micro_sam) AND pip's
      # opencv-python-headless from environment.yml. The cv2/ package
      # dir shadows any bare cv2*.so beside it, so the loader finds no
      # native module anywhere and dies with 'recursion is detected' —
      # no config patching can fix a shadowing conflict. The old
      # workflow force-replaced conda's cv2 for exactly this reason;
      # that step was dropped when patching alone happened to suffice
      # with May's package set. Reinstated, decisively: remove every
      # cv2 flavor, then install exactly one (pip headless, --no-deps
      # so numpy/BLAS stay untouched).
      - name: Force a single cv2 (pip opencv-python-headless)
        shell: bash -el {0}
        run: |
          micromamba remove -n eye-labeller -y --force \
            opencv py-opencv libopencv 2>/dev/null || true
          pip uninstall -y opencv-python opencv-python-headless \
            opencv-contrib-python opencv-contrib-python-headless \
            2>/dev/null || true
          # Scrub any orphaned leftovers of either layout.
          python - <<'PY'
          import glob, os, shutil, sysconfig
          sp = sysconfig.get_paths()['purelib']
          for pat in ('cv2', 'cv2.*', 'opencv_python*', 'opencv-python*'):
              for p in glob.glob(os.path.join(sp, pat)):
                  (shutil.rmtree if os.path.isdir(p) else os.remove)(p)
                  print('removed leftover:', p)
          PY
          pip install --no-deps opencv-python-headless
          # Diagnostic ground truth for any future drift: what does the
          # cv2 install actually look like now?
          python - <<'PY'
          import glob, os, sysconfig
          sp = sysconfig.get_paths()['purelib']
          for p in sorted(glob.glob(os.path.join(sp, 'cv2*'))):
              print(p)
              if os.path.isdir(p):
                  for q in sorted(os.listdir(p))[:25]:
                      print('   ', q)
          PY

      # Same conda/pip duplication disease as cv2, different organ:
      # conda's pillow links conda's libtiff/libjpeg, and inside a
      # PyInstaller bundle that pairing broke ('undefined symbol:
      # jpeg12_write_raw_data'). pip's pillow wheel is self-contained
      # (bundles its own image libs under PIL.libs with $ORIGIN
      # rpaths), which survives bundling on every OS.
      - name: Force self-contained pip pillow
        shell: bash -el {0}
        run: |
          pip install --force-reinstall --no-deps pillow

      # NOTE: PyQt6 import is validated by the source-tree selftest
      # below (after the Linux GL libs are installed). We no longer
      # surgically rewrite Qt on Windows — a plain `conda env create`
      # launches PyQt6 fine on real machines; keep the env clean.

      - name: Patch cv2 config files to use bundle-safe relative paths
        shell: bash -el {0}
        run: |
          # conda-forge's opencv-python-headless ships config.py /
          # config-<pyver>.py with the conda env's ABSOLUTE PATH baked
          # in -- those paths get into the PyInstaller bundle and
          # crash on the user's machine with:
          #   ImportError: ERROR: recursion is detected during loading
          #   of "cv2" binary extensions. Check OpenCV installation.
          #
          # First tried `pip install --ignore-installed
          # opencv-python-headless` (v0.1.7) to overlay pip's wheel
          # files, but pip's wheel uses a flat cv2/ layout and doesn't
          # ship config*.py at all -- conda's broken ones stayed put.
          #
          # Final fix: overwrite the config files in-place with paths
          # computed at runtime from __file__. Works both inside the
          # live env (LOADER_DIR resolves to the env's cv2/) and inside
          # a PyInstaller bundle (LOADER_DIR resolves to the bundle's
          # cv2/). Single source of truth, no surprise.
          CV2_DIR=$(python -c "import cv2, os; print(os.path.dirname(cv2.__file__))")
          PY_VER=$(python -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          echo "Patching $CV2_DIR/config*.py for Python $PY_VER"

          # config.py — keep BINARIES_PATHS empty; system-default lib
          # dirs and PyInstaller's @rpath rewrites handle .dylib/.so
          # lookup. The conda version pointed BINARIES_PATHS at the
          # env's lib/ dir which doesn't exist in the bundle.
          cat > "$CV2_DIR/config.py" <<'EOF'
          import os
          BINARIES_PATHS = []
          EOF

          # config-<pyver>.py — point PYTHON_EXTENSIONS_PATHS at
          # wherever the native module ACTUALLY lives, relative to this
          # config file. Two layouts exist in the wild and the resolver
          # picks whichever dependency set won this solve:
          #   conda-forge:  cv2/python-X.Y/cv2.cpython-*.so
          #   pip wheel:    cv2/cv2*.so  (flat)
          # Hardcoding python-X.Y (the old approach) broke the moment a
          # July 2026 re-solve produced the flat layout: the loader
          # found no native module on the configured path and died with
          # 'recursion is detected during loading of cv2'. Listing only
          # directories that exist — with the loader dir as fallback —
          # works for both layouts, in the env and in the bundle.
          cat > "$CV2_DIR/config-${PY_VER}.py" <<EOF
          import os
          _here = os.path.dirname(os.path.abspath(__file__))
          PYTHON_EXTENSIONS_PATHS = [
              p for p in (os.path.join(_here, 'python-${PY_VER}'), _here)
              if os.path.isdir(p)
          ] + PYTHON_EXTENSIONS_PATHS
          EOF

          # Verify the new configs are bundle-safe AND cv2 still loads.
          python - <<'PY'
          import pathlib, sys
          import cv2
          cv2_dir = pathlib.Path(cv2.__file__).parent
          for cfg in ('config.py', f'config-{sys.version_info.major}.{sys.version_info.minor}.py'):
              p = cv2_dir / cfg
              text = p.read_text()
              print(f'--- {cfg} ---'); print(text)
              for bad in ('/Users/runner/', '/home/runner/', 'runneradmin'):
                  if bad in text:
                      raise SystemExit(f'FAIL: {cfg} still contains {bad!r}')
          print(f'cv2 OK: {cv2.__version__} at {cv2.__file__}')
          PY

      # PyQt6 links against system GL/X11 libraries that GitHub's
      # headless Linux runners don't ship — without them even
      # `import PyQt6.QtWidgets` dies with 'libEGL.so.1: cannot open
      # shared object file'. Needed by both selftest steps (the bundle
      # links the same system libs).
      - name: Install Linux Qt system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libopengl0 libxkbcommon0 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0

      # TEMP DIAGNOSTIC — Windows Qt "DLL load failed importing QtWidgets:
      # specified procedure could not be found". Evidence-first: earlier
      # scorched-earth conda-Qt removal + pip reinstall did NOT fix it, so
      # dump the actual Qt inventory (versions, every Qt6 DLL on disk,
      # QtCore-alone vs QtWidgets) before guessing again. Remove once green.
      - name: DIAG — Windows Qt inventory
        if: runner.os == 'Windows'
        shell: bash -el {0}
        run: |
          set +e
          ENV="$MAMBA_ROOT_PREFIX/envs/eye-labeller"
          echo "===================== pip Qt/PySide/sip ====================="
          pip list 2>/dev/null | grep -iE "pyqt|pyside|sip|^qt"
          echo "===================== conda Qt-ish pkgs ====================="
          micromamba list -n eye-labeller 2>/dev/null | grep -iE "qt|napari|pyside|magicgui|superqt|vispy"
          echo "================= pip PyQt6 trio versions ==================="
          python - <<'PY'
          import importlib.metadata as m
          for pkg in ("PyQt6", "PyQt6-Qt6", "PyQt6-sip"):
              try:
                  print(pkg, "=", m.version(pkg))
              except Exception as e:
                  print(pkg, "MISSING", e)
          PY
          echo "============ every Qt6Core/Gui/Widgets DLL on disk =========="
          find "$ENV" -iname "Qt6Core.dll" -o -iname "Qt6Gui.dll" -o -iname "Qt6Widgets.dll" 2>/dev/null
          echo "================== pip PyQt6/Qt6/bin listing ================"
          PB=$(python -c "import PyQt6, os; print(os.path.join(os.path.dirname(PyQt6.__file__), 'Qt6', 'bin'))")
          echo "pip PyQt6 bin: $PB"
          ls "$PB" 2>/dev/null | grep -iE "Qt6Core|Qt6Widgets|Qt6Gui|msvcp|vcruntime" | head
          echo "================== import attempt (detail) ================="
          python - <<'PY'
          import os, traceback
          print("PATH head:", os.environ.get("PATH", "")[:500])
          try:
              import PyQt6.QtCore as c
              print("QtCore alone OK, Qt", c.QT_VERSION_STR)
          except Exception:
              traceback.print_exc()
          try:
              from PyQt6.QtWidgets import QApplication
              print("QtWidgets OK")
          except Exception:
              traceback.print_exc()
          PY
          echo "==== which icuuc.dll exports the symbols Qt6Core needs? ===="
          pip install -q pefile 2>/dev/null
          python - <<'PY'
          import os, pefile
          env = os.path.join(os.environ["MAMBA_ROOT_PREFIX"], "envs", "eye-labeller", "Library", "bin")
          sys32 = r"C:\Windows\System32"
          wanted = {"UCNV_TO_U_CALLBACK_SUBSTITUTE", "UCNV_FROM_U_CALLBACK_SUBSTITUTE"}
          def exports(p):
              try:
                  pe = pefile.PE(p, fast_load=True)
                  pe.parse_data_directories(directories=[
                      pefile.DIRECTORY_ENTRY["IMAGE_DIRECTORY_ENTRY_EXPORT"]])
                  names = {s.name.decode() for s in getattr(
                      pe.DIRECTORY_ENTRY_EXPORT, "symbols", []) if s.name}
                  pe.close(); return names
              except Exception as ex:
                  return None
          for label, p in [("System32/icuuc.dll", os.path.join(sys32, "icuuc.dll")),
                           ("conda/icuuc.dll", os.path.join(env, "icuuc.dll")),
                           ("conda/icuuc78.dll", os.path.join(env, "icuuc78.dll"))]:
              ex = exports(p)
              if ex is None:
                  print(f"{label}: MISSING/unreadable"); continue
              print(f"{label}: total={len(ex)} hasWanted={wanted & ex or 'NONE'}")
          PY
          echo "==== FIX TEST: preload System32 icuuc, then import QtCore ===="
          python - <<'PY'
          import os, ctypes, traceback
          sys32 = r"C:\Windows\System32"
          os.add_dll_directory(sys32)
          for d in ("icuuc.dll", "icuin.dll"):
              try:
                  ctypes.WinDLL(os.path.join(sys32, d)); print("preloaded", d)
              except OSError as e:
                  print("preload FAIL", d, e)
          try:
              import PyQt6.QtCore as c
              print("SYS32-ICU RESULT: QtCore OK, Qt", c.QT_VERSION_STR)
          except Exception:
              traceback.print_exc(); print("SYS32-ICU RESULT: FAIL")
          PY
          exit 0

      # Run the app's own --selftest from the source tree first: if
      # this fails, the problem is the ENV (deps, imports), not the
      # bundling — the distinction saves an hour of guessing.
      - name: Smoke-test source tree (--selftest)
        timeout-minutes: 15
        shell: bash -el {0}
        run: |
          python main.py --selftest

      - name: Build with PyInstaller
        shell: bash -el {0}
        run: |
          pyinstaller packaging/eye_labeller.spec --clean --noconfirm

      # Then run the BUILT bundle. Every past bundle breakage (cv2
      # config recursion, numpy/Accelerate symbols, Qt plugin paths)
      # manifested at import/startup — exactly what this catches.
      # Without it, Windows/Linux zips shipped fully untested.
      - name: Smoke-test built bundle (--selftest)
        # Hard cap: in the windowed bundle an uncaught startup error can
        # surface as a modal dialog no runner can dismiss — fail in
        # minutes, not the 6-hour job default.
        timeout-minutes: 15
        shell: bash -el {0}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./dist/EyeDataLabeller/EyeDataLabeller.exe --selftest
          elif [ -x dist/EyeDataLabeller/EyeDataLabeller/EyeDataLabeller ]; then
            ./dist/EyeDataLabeller/EyeDataLabeller/EyeDataLabeller --selftest
          elif [ -x dist/EyeDataLabeller/EyeDataLabeller ]; then
            ./dist/EyeDataLabeller/EyeDataLabeller --selftest
          else
            ./dist/EyeDataLabeller.app/Contents/MacOS/EyeDataLabeller --selftest
          fi

      # macOS: turn the COLLECT folder into a .app + a .dmg ready to
      # mount. Windows / Linux: zip the COLLECT folder as-is.
      - name: Package macOS artifact
        if: runner.os == 'macOS'
        shell: bash -el {0}
        run: |
          cd dist
          # PyInstaller emits both EyeDataLabeller/ and EyeDataLabeller.app
          if [ -d EyeDataLabeller.app ]; then
            zip -ry ../${{ matrix.artifact }} EyeDataLabeller.app
          else
            zip -ry ../${{ matrix.artifact }} EyeDataLabeller
          fi

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\EyeDataLabeller -DestinationPath ${{ matrix.artifact }}

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        shell: bash -el {0}
        run: |
          cd dist
          zip -ry ../${{ matrix.artifact }} EyeDataLabeller

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          # Extension-less artifact name: the Actions UI wraps artifacts
          # in a zip for download, so a ".zip" name produced
          # confusing "*.zip.zip" downloads for testers.
          name: EyeDataLabeller-${{ matrix.label }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

      # Attach to a Release only when this run was triggered by a tag.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
